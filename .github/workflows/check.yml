name: Check Haneda P3 Parking Availability

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}  # 手動実行もできるようにしておく

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      # 前回チェック時の状態(state.json)をキャッシュから復元する。
      # keyにgithub.run_id(実行のたびに変わる値)を含めることで、
      # 「厳密一致は必ず外れる→restore-keysで直近のキャッシュを復元する→
      #  ジョブ終了時に新しいkeyで自動的に保存される」という、
      # GitHub Actionsで状態を引き継ぐ定番のやり方。
      - name: Restore previous state
        uses: actions/cache@v4
        with:
          path: state.json
          key: haneda-state-${{ github.run_id }}
          restore-keys: |
            haneda-state-

      - name: Run check
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python check_availability.py
